<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Close Order</title>
</head>
<body>
<h1>Close Order #{{ order.id }}</h1>
<p><strong>Book:</strong> {{ order.book.name }}</p>
<p><strong>User:</strong> {{ order.user.email }}</p>
<p><strong>Created:</strong> {{ order.created_at|date:"d.m.Y" }}</p>
<p>Confirm book return?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm</button>
    <a href="{% url 'order_list' %}">Cancel</a>
</form>
</body>
</html>
